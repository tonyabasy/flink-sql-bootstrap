name: 🐞 Bug Report
description: Report a bug to help us improve
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    attributes:
      label: Search before asking
      description: Please search existing issues before filing a new one.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    attributes:
      label: Current Behavior
      description: What happened? Include error messages, unexpected output, or stack traces if available.
      placeholder: |
        When I run `...`, the job fails with `SqlValidateException`.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Minimal SQL script + CLI command that triggers the bug.
      placeholder: |
        1. Create `test.sql` with: `CREATE TABLE ...`
        2. Run: `flink run ... --script-file classpath:test.sql`
        3. See error
      render: markdown
    validations:
      required: true
  - type: input
    attributes:
      label: Flink Version
      description: e.g. 1.20.4, 2.2.0
    validations:
      required: true
  - type: input
    attributes:
      label: Java Version
      description: e.g. 11, 17, 21
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Deployment Mode
      description: How are you running Flink?
      options:
        - Local
        - Standalone Cluster
        - YARN
        - Kubernetes
        - Application Mode
  - type: textarea
    attributes:
      label: Additional Context
      description: Logs, config files, or anything else that might help.