services:
  hadoop:
    build: .
    container_name: flink-yarn-hadoop
    hostname: localhost
    mem_limit: 4g
    ports:
      - "127.0.0.1:9870:9870"
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:8088:8088"
      - "127.0.0.1:8042:8042"
      - "127.0.0.1:8032:8032"
      - "127.0.0.1:9866:9866"
      - "127.0.0.1:9864:9864"
    environment:
      - HDFS_NAMENODE_USER=root
      - HDFS_DATANODE_USER=root
      - YARN_RESOURCEMANAGER_USER=root
      - YARN_NODEMANAGER_USER=root
    volumes:
      - hadoop_data:/var/hadoop
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
      - ./entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/ws/v1/cluster/info"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  hadoop_data:
