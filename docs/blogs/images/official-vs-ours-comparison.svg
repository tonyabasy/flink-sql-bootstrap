<svg width="100%" viewBox="0 0 680 310" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>官方方案与本文方案对比</title>
  <desc>左侧为 Flink 2.x 官方路线，右侧为本文的 Flink 1.20+ 方案，展示两者在 Gateway 依赖、版本要求等维度上的差异</desc>
  <defs>
    <marker id="arrc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 左栏：官方方案 -->
  <rect x="20" y="20" width="295" height="270" rx="12"
        fill="#f0efe9" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <text x="167" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">Flink 2.x 官方路线</text>

  <!-- 左栏各项 -->
  <rect x="40" y="60" width="255" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="167" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">SQL Gateway 进程</text>
  <text x="167" y="91" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">必须启动并常驻</text>

  <line x1="167" y1="98" x2="167" y2="112" stroke="#BA7517" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="40" y="112" width="255" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="167" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">SqlDriver + ScriptRunner</text>
  <text x="167" y="143" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">反射加载 Gateway jar 类</text>

  <line x1="167" y1="150" x2="167" y2="164" stroke="#BA7517" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="40" y="164" width="255" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="167" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">Artifacts 分发</text>
  <text x="167" y="195" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">K8s / YARN 各自配置</text>

  <!-- 左栏限制标签 -->
  <rect x="40" y="218" width="255" height="56" rx="6"
        fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="60" y="238" font-size="11" fill="#A32D2D" font-family="-apple-system, PingFang SC, sans-serif">✗  需要常驻 Gateway 服务进程</text>
  <text x="60" y="254" font-size="11" fill="#A32D2D" font-family="-apple-system, PingFang SC, sans-serif">✗  仅支持 Flink 2.x，不向前兼容</text>
  <text x="60" y="270" font-size="11" fill="#A32D2D" font-family="-apple-system, PingFang SC, sans-serif">✗  工件分发复杂，运维成本高</text>

  <!-- 右栏：本文方案 -->
  <rect x="365" y="20" width="295" height="270" rx="12"
        fill="#f0efe9" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <text x="512" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">本文方案（Flink 1.20+）</text>

  <rect x="385" y="60" width="255" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="512" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">flink run（无 Gateway 进程）</text>
  <text x="512" y="91" text-anchor="middle" font-size="11" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">直接 flink run 提交</text>

  <line x1="512" y1="98" x2="512" y2="112" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="385" y="112" width="255" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="512" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">StreamingScriptExecutor</text>
  <text x="512" y="143" text-anchor="middle" font-size="11" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">直接 new SessionContext，无反射</text>

  <line x1="512" y1="150" x2="512" y2="164" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="385" y="164" width="255" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="512" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">标准 Flink jar 提交</text>
  <text x="512" y="195" text-anchor="middle" font-size="11" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">Application / Per-job / Session 均支持</text>

  <!-- 右栏优势标签 -->
  <rect x="385" y="218" width="255" height="56" rx="6"
        fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="405" y="238" font-size="11" fill="#27500A" font-family="-apple-system, PingFang SC, sans-serif">✓  无需 Gateway 服务，零额外运维</text>
  <text x="405" y="254" font-size="11" fill="#27500A" font-family="-apple-system, PingFang SC, sans-serif">✓  兼容 Flink 1.20+ LTS，生产就绪</text>
  <text x="405" y="270" font-size="11" fill="#27500A" font-family="-apple-system, PingFang SC, sans-serif">✓  所有部署模式 / 环境通用</text>

  <!-- 中间 VS -->
  <text x="340" y="162" text-anchor="middle" font-size="18" font-weight="600" fill="#8a8880" font-family="-apple-system, PingFang SC, sans-serif">vs</text>
</svg>