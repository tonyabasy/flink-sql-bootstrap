<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="100%" height="100%">
  <title>flink-sql-bootstrap and Flink Module Architecture</title>
  <desc>Top: flink-sql-bootstrap custom modules (SqlEntryPoint, CatalogEntityFactory, CatalogEntity), Bottom: Flink official modules (flink-sql-gateway, flink-table-common, flink-table-planner), arrows indicate API call relationships</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-inner" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7"
            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ==================== 上半：flink-sql-bootstrap ==================== -->
  <rect x="40" y="26" width="600" height="170" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="54" font-family="system-ui,PingFang SC,sans-serif" font-size="14" font-weight="600" fill="#3C3489" text-anchor="middle">flink-sql-bootstrap</text>

  <!-- SqlEntryPoint -->
  <rect x="64" y="76" width="180" height="48" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="154" y="94" font-family="system-ui,PingFang SC,sans-serif" font-size="12" font-weight="600" fill="#633806" text-anchor="middle">SqlEntryPoint</text>
  <text x="154" y="112" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#854F0B" text-anchor="middle">CLI Parsing · Multi-protocol Loading</text>

  <!-- 箭头 SqlEntryPoint → CatalogEntityFactory -->
  <line x1="244" y1="100" x2="286" y2="100" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow-inner)"/>

  <!-- CatalogEntityFactory -->
  <rect x="288" y="76" width="180" height="48" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="378" y="94" font-family="system-ui,PingFang SC,sans-serif" font-size="12" font-weight="600" fill="#633806" text-anchor="middle">CatalogEntityFactory</text>
  <text x="378" y="112" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#854F0B" text-anchor="middle">JSON → Catalog · Schema Building</text>

  <!-- CatalogEntity -->
  <rect x="160" y="138" width="360" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="155" font-family="system-ui,PingFang SC,sans-serif" font-size="11" font-weight="600" fill="#085041" text-anchor="middle">CatalogEntity (POJO)</text>
  <text x="340" y="170" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#0F6E56" text-anchor="middle">tables[] · views[] · udfs[] ...</text>

  <!-- 虚线：SqlEntryPoint 向下 → CatalogEntity -->
  <line x1="154" y1="124" x2="154" y2="136" stroke="#534AB7" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- 虚线：CatalogEntityFactory 向下 → CatalogEntity -->
  <line x1="378" y1="124" x2="378" y2="136" stroke="#534AB7" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ==================== 跨模块区域箭头 ==================== -->

  <!-- 左侧箭头：SqlEntryPoint → flink-sql-gateway -->
  <line x1="124" y1="196" x2="124" y2="256" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="108" y="226" font-family="system-ui,PingFang SC,sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">SessionContext</text>
  <text x="108" y="238" font-family="system-ui,PingFang SC,sans-serif" font-size="9" fill="#5F5E5A" text-anchor="middle">Creation &amp; Management</text>

  <!-- 中间箭头：CatalogEntityFactory → flink-table-common -->
  <line x1="340" y1="196" x2="340" y2="308" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="356" y="230" font-family="system-ui,PingFang SC,sans-serif" font-size="9" fill="#5F5E5A" text-anchor="start">CatalogTable · CatalogView</text>
  <text x="356" y="240" font-family="system-ui,PingFang SC,sans-serif" font-size="9" fill="#5F5E5A" text-anchor="start">createTable() · createFunction()</text>

  <!-- 右侧箭头：CatalogEntityFactory → flink-table-planner -->
  <line x1="556" y1="196" x2="556" y2="360" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="572" y="274" font-family="system-ui,PingFang SC,sans-serif" font-size="9" fill="#5F5E5A" text-anchor="start">DML Compilation</text>
  <text x="572" y="286" font-family="system-ui,PingFang SC,sans-serif" font-size="9" fill="#5F5E5A" text-anchor="start">&amp; Execution</text>

  <!-- ==================== 下半：Flink Modules ==================== -->
  <rect x="40" y="258" width="600" height="168" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="284" font-family="system-ui,PingFang SC,sans-serif" font-size="14" font-weight="600" fill="#444441" text-anchor="middle">Flink Modules</text>
  <text x="340" y="300" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#5F5E5A" text-anchor="middle">Official API · Zero Modification</text>

  <!-- flink-sql-gateway -->
  <rect x="60" y="314" width="180" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="150" y="336" font-family="system-ui,PingFang SC,sans-serif" font-size="12" font-weight="600" fill="#0C447C" text-anchor="middle">flink-sql-gateway</text>
  <text x="150" y="354" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#185FA5" text-anchor="middle">SessionEnvironment</text>
  <text x="150" y="370" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#185FA5" text-anchor="middle">SessionContext</text>
  <text x="150" y="386" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#185FA5" text-anchor="middle">OperationExecutor</text>

  <!-- flink-table-common -->
  <rect x="260" y="314" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="350" y="336" font-family="system-ui,PingFang SC,sans-serif" font-size="12" font-weight="600" fill="#085041" text-anchor="middle">flink-table-common</text>
  <text x="350" y="354" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#0F6E56" text-anchor="middle">GenericInMemoryCatalog</text>
  <text x="350" y="370" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#0F6E56" text-anchor="middle">Schema.Builder</text>
  <text x="350" y="386" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#0F6E56" text-anchor="middle">CatalogTable / DataTypes</text>

  <!-- flink-table-planner -->
  <rect x="460" y="314" width="160" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="540" y="336" font-family="system-ui,PingFang SC,sans-serif" font-size="12" font-weight="600" fill="#0C447C" text-anchor="middle">flink-table-planner</text>
  <text x="540" y="354" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#185FA5" text-anchor="middle">Planner</text>
  <text x="540" y="370" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#185FA5" text-anchor="middle">TableEnvironment</text>
  <text x="540" y="386" font-family="system-ui,PingFang SC,sans-serif" font-size="10" fill="#185FA5" text-anchor="middle">parse→validate→compile</text>

</svg>
