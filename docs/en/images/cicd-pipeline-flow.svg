<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flink SQL CI/CD Three-Stage Pipeline</title>
  <desc>Complete CI/CD from git push to deployment: CI stage (naming + validation) and CD stage (orchestration + child pipeline)</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 入口 -->
  <rect x="230" y="16" width="220" height="32" rx="6" fill="#26215C" stroke="none"/>
  <text x="340" y="37" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">git push → GitLab Runner</text>

  <line x1="240" y1="48" x2="180" y2="66" stroke="#888780" stroke-width="1" marker-end="url(#arrp)"/>
  <line x1="440" y1="48" x2="500" y2="66" stroke="#888780" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- CI Stage -->
  <rect x="20" y="68" width="300" height="152" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="170" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">CI Stage</text>
  <text x="170" y="108" text-anchor="middle" font-size="10" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">MR / push to main · Triggered on .sql changes</text>

  <rect x="36" y="118" width="268" height="42" rx="5" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="170" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">① warehouse-naming-check</text>
  <text x="170" y="152" text-anchor="middle" font-size="9" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">Check {layer}_{business}_{suffix}.sql naming</text>

  <line x1="170" y1="160" x2="170" y2="172" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="36" y="172" width="268" height="42" rx="5" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="170" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">② flink-sql-validate</text>
  <text x="170" y="206" text-anchor="middle" font-size="9" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">Incremental syntax + semantic check · --validate</text>

  <!-- CI → 过渡 -->
  <line x1="170" y1="220" x2="170" y2="238" stroke="#5a5955" stroke-width="1.2" marker-end="url(#arrp)"/>
  <text x="170" y="256" text-anchor="middle" font-size="9" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">All pass → Create MR → Code Review</text>

  <!-- CI → CD 箭头 -->
  <line x1="320" y1="144" x2="360" y2="144" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>
  <text x="340" y="136" text-anchor="middle" font-size="9" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">Approved</text>

  <!-- CD Stage -->
  <rect x="360" y="68" width="300" height="152" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="510" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">CD Stage</text>
  <text x="510" y="108" text-anchor="middle" font-size="10" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">Only main branch · Triggered on .sql changes</text>

  <rect x="376" y="118" width="268" height="42" rx="5" fill="#C3DCFA" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="510" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">③ generate-deploy-pipeline</text>
  <text x="510" y="152" text-anchor="middle" font-size="9" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">Detect changes → Sort by layer → Generate child-pipeline.yml</text>

  <line x1="510" y1="160" x2="510" y2="172" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="376" y="172" width="268" height="42" rx="5" fill="#C3DCFA" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="510" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">④ deploy-jobs (child pipeline)</text>
  <text x="510" y="206" text-anchor="middle" font-size="9" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">deploy-orders-dwd → deploy-orders-ads</text>

  <!-- 底部四能力对应 -->
  <rect x="20" y="276" width="640" height="50" rx="8" fill="#FAF7F2" stroke="#E0D8C8" stroke-width="0.5"/>
  <text x="100" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">Naming Check</text>
  <text x="260" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">Syntax + Semantic Validation</text>
  <text x="420" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">Dynamic Orchestration</text>
  <text x="580" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">Approved Deploy</text>
  <text x="100" y="314" text-anchor="middle" font-size="9" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">Verifiable</text>
  <text x="260" y="314" text-anchor="middle" font-size="9" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">Verifiable</text>
  <text x="420" y="314" text-anchor="middle" font-size="9" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">Automated</text>
  <text x="580" y="314" text-anchor="middle" font-size="9" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">Rollbackable · Traceable</text>

</svg>
