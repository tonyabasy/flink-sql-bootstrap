<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flink SQL --validate → --compile → execute Pipeline</title>
  <desc>Three-stage pipeline from validation to compilation to execution. --validate is the lightest entry point.</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Stage labels -->
  <text x="103" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">Stage 1</text>
  <text x="340" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">Stage 2</text>
  <text x="577" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">Stage 3</text>

  <!-- Stage 1: validate -->
  <rect x="16" y="42" width="174" height="212" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">Syntax &amp; Semantic Check</text>
  <text x="103" y="82" text-anchor="middle" font-size="11" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">--validate</text>

  <rect x="32" y="96" width="142" height="28" rx="5" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="114" text-anchor="middle" font-size="11" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">SQL Script File</text>

  <line x1="103" y1="124" x2="103" y2="140" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="32" y="140" width="142" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="158" text-anchor="middle" font-size="11" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">Calcite parser.parse()</text>

  <line x1="103" y1="168" x2="103" y2="184" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="32" y="184" width="142" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="202" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">DDL → Execute Immediately</text>

  <rect x="32" y="216" width="142" height="24" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="232" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">DML → Stage (no compile)</text>

  <!-- validate → compile arrow -->
  <line x1="190" y1="158" x2="210" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- Stage 2: compile -->
  <rect x="210" y="42" width="260" height="212" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">Compile to Execution Plan</text>
  <text x="340" y="82" text-anchor="middle" font-size="11" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">--compile</text>

  <rect x="226" y="96" width="228" height="28" rx="5" fill="#C3DCFA" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="114" text-anchor="middle" font-size="11" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">DML ModifyOperation List</text>

  <line x1="340" y1="124" x2="340" y2="140" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="226" y="140" width="228" height="28" rx="5" fill="#ffffff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">planner.compilePlan()</text>

  <line x1="340" y1="168" x2="340" y2="184" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="226" y="184" width="228" height="56" rx="5" fill="#ffffff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">PlanInternal (JSON)</text>
  <text x="340" y="218" text-anchor="middle" font-size="10" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">Source → Calc → Join → Sink DAG</text>
  <text x="340" y="232" text-anchor="middle" font-size="10" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">FilterPushDown &amp; other optimizations</text>

  <!-- compile → execute arrow -->
  <line x1="470" y1="158" x2="490" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- Stage 3: execute -->
  <rect x="490" y="42" width="174" height="212" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">Submit &amp; Execute</text>
  <text x="577" y="82" text-anchor="middle" font-size="11" fill="#993C1D" font-family="-apple-system, PingFang SC, sans-serif">Default mode</text>

  <rect x="506" y="96" width="142" height="28" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="114" text-anchor="middle" font-size="10" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">translatePlan()</text>

  <line x1="577" y1="124" x2="577" y2="140" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="506" y="140" width="142" height="28" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="158" text-anchor="middle" font-size="10" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">injectResourceSpec()</text>

  <line x1="577" y1="168" x2="577" y2="184" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="506" y="184" width="142" height="38" rx="5" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
  <text x="577" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">executeInternal()</text>
  <text x="577" y="215" text-anchor="middle" font-size="10" fill="#FAECE7" font-family="-apple-system, PingFang SC, sans-serif">→ Flink cluster</text>

  <!-- Bottom annotations -->
  <text x="103" y="268" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">~2s · no cluster connection</text>
  <text x="340" y="268" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">~5s · local compilation</text>
  <text x="577" y="268" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">Cluster execution</text>

</svg>
