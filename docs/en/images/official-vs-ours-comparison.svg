<svg width="100%" viewBox="0 0 680 310" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Official vs This Approach</title>
  <desc>Left: Flink 2.x official. Right: This approach (Flink 1.20+). Comparing Gateway dependency, version requirements, etc.</desc>
  <defs>
    <marker id="arrc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Left column: Official solution -->
  <rect x="8" y="20" width="278" height="270" rx="12"
        fill="#f0efe9" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <text x="147" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">Flink 2.x Official</text>

  <rect x="24" y="60" width="246" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="147" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">SQL Gateway Process</text>
  <text x="147" y="91" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">Must Start &amp; Stay Running</text>

  <line x1="147" y1="98" x2="147" y2="112" stroke="#BA7517" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="24" y="112" width="246" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="147" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">SqlDriver + ScriptRunner</text>
  <text x="147" y="143" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">Reflectively loads Gateway JAR classes</text>

  <line x1="147" y1="150" x2="147" y2="164" stroke="#BA7517" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="24" y="164" width="246" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="147" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">Artifact Distribution</text>
  <text x="147" y="195" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">Manual K8s / YARN config</text>

  <rect x="24" y="218" width="246" height="56" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="44" y="238" font-size="11" fill="#A32D2D" font-family="-apple-system, PingFang SC, sans-serif">✗ Requires running Gateway service</text>
  <text x="44" y="254" font-size="11" fill="#A32D2D" font-family="-apple-system, PingFang SC, sans-serif">✗ Flink 2.x only, no backward compat</text>
  <text x="44" y="270" font-size="11" fill="#A32D2D" font-family="-apple-system, PingFang SC, sans-serif">✗ Complex artifact distribution</text>

  <!-- Right column: Our solution -->
  <rect x="320" y="20" width="352" height="270" rx="12"
        fill="#f0efe9" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <text x="496" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#5a5955" font-family="-apple-system, PingFang SC, sans-serif">This Approach (Flink 1.20+)</text>

  <rect x="336" y="60" width="320" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="496" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">flink run (No Gateway Process)</text>
  <text x="496" y="91" text-anchor="middle" font-size="11" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">Direct flink run submission</text>

  <line x1="496" y1="98" x2="496" y2="112" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="336" y="112" width="320" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="496" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">StreamingScriptExecutor</text>
  <text x="496" y="143" text-anchor="middle" font-size="11" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">Directly new SessionContext, no reflection</text>

  <line x1="496" y1="150" x2="496" y2="164" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrc)"/>

  <rect x="336" y="164" width="320" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="496" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">Standard Flink jar submission</text>
  <text x="496" y="195" text-anchor="middle" font-size="11" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">Application / Per-job / Session all supported</text>

  <rect x="336" y="218" width="320" height="56" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="356" y="238" font-size="11" fill="#27500A" font-family="-apple-system, PingFang SC, sans-serif">✓  No Gateway service, zero additional ops</text>
  <text x="356" y="254" font-size="11" fill="#27500A" font-family="-apple-system, PingFang SC, sans-serif">✓  Compatible with Flink 1.20+ LTS, production-ready</text>
  <text x="356" y="270" font-size="11" fill="#27500A" font-family="-apple-system, PingFang SC, sans-serif">✓  All deployment modes / environments supported</text>

  <!-- Middle VS -->
  <text x="304" y="162" text-anchor="middle" font-size="18" font-weight="600" fill="#8a8880" font-family="-apple-system, PingFang SC, sans-serif">vs</text>

</svg>
