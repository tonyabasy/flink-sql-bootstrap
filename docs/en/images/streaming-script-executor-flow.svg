<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>StreamingScriptExecutor Three-Stage Execution Flow</title>
  <desc>Shows the complete processing flow of SQL scripts through three stages: intelligent splitting, dispatch by type, and unified submission</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Stage labels -->
  <text x="115" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">Stage 1</text>
  <text x="360" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">Stage 2</text>
  <text x="583" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">Stage 3</text>

  <!-- Stage 1: Intelligent Splitting -->
  <rect x="12" y="42" width="206" height="290" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="115" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">Intelligent Splitting</text>
  <text x="115" y="82" text-anchor="middle" font-size="11" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">State machine tokenization</text>

  <rect x="26" y="102" width="178" height="32" rx="5" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="115" y="123" text-anchor="middle" font-size="11" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">SQL Script File</text>

  <line x1="115" y1="134" x2="115" y2="148" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="26" y="148" width="178" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="115" y="166" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">CREATE TABLE ...;</text>

  <rect x="26" y="182" width="178" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="115" y="200" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">SET 'key' = 'val';</text>

  <rect x="26" y="216" width="178" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="115" y="234" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">INSERT INTO ...;</text>

  <rect x="26" y="260" width="178" height="56" rx="5" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="115" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">State Machine Rules</text>
  <text x="115" y="299" text-anchor="middle" font-size="10" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">Semicolons in quotes → skip</text>
  <text x="115" y="314" text-anchor="middle" font-size="10" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">Semicolons in comments → skip</text>

  <!-- S1 → S2 arrow -->
  <line x1="218" y1="184" x2="240" y2="184" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- Stage 2: Dispatch by Type -->
  <rect x="240" y="42" width="240" height="284" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="360" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">Dispatch by Type</text>
  <text x="360" y="82" text-anchor="middle" font-size="11" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">By Operation Type</text>

  <!-- Execute immediately group -->
  <rect x="256" y="96" width="208" height="108" rx="5" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="360" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#04342C" font-family="-apple-system, PingFang SC, sans-serif">Execute Immediately</text>
  <text x="360" y="134" text-anchor="middle" font-size="10" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">SET / RESET → affects compile env</text>

  <rect x="268" y="148" width="184" height="22" rx="4" fill="#C3DCFA" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="360" y="164" text-anchor="middle" font-size="9" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">CREATE TABLE / VIEW / FUNCTION</text>

  <rect x="268" y="176" width="184" height="22" rx="4" fill="#C3DCFA" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="360" y="192" text-anchor="middle" font-size="9" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">CALL → stored procedure side effects</text>

  <!-- Deferred group -->
  <rect x="256" y="216" width="208" height="90" rx="5" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="360" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">Deferred, unified compilation</text>

  <rect x="268" y="248" width="184" height="20" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="360" y="262" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">INSERT INTO / STATEMENT SET</text>

  <text x="360" y="288" text-anchor="middle" font-size="10" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">Collect all DML, wait for final compilation</text>

  <!-- S2 → S3 arrow -->
  <line x1="480" y1="184" x2="498" y2="184" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- Stage 3: Unified Submit -->
  <rect x="498" y="42" width="170" height="284" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="583" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">Unified Submit</text>
  <text x="583" y="82" text-anchor="middle" font-size="11" fill="#993C1D" font-family="-apple-system, PingFang SC, sans-serif">Compile &amp; Submit</text>

  <rect x="512" y="96" width="142" height="36" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="583" y="120" text-anchor="middle" font-size="11" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">compilePlan()</text>

  <line x1="583" y1="132" x2="583" y2="148" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="512" y="148" width="142" height="36" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="583" y="172" text-anchor="middle" font-size="11" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">translatePlan()</text>

  <line x1="583" y1="184" x2="583" y2="200" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="512" y="200" width="142" height="36" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="583" y="218" text-anchor="middle" font-size="10" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">injectResourceSpec()</text>
  <text x="583" y="234" text-anchor="middle" font-size="7" fill="#993C1D" font-family="-apple-system, PingFang SC, sans-serif">Optional operator-level resource injection</text>

  <line x1="583" y1="236" x2="583" y2="256" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="512" y="256" width="142" height="50" rx="5" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
  <text x="583" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">executeInternal()</text>
  <text x="583" y="296" text-anchor="middle" font-size="10" fill="#FAECE7" font-family="-apple-system, PingFang SC, sans-serif">Submit to Flink cluster</text>

</svg>
