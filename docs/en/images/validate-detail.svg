<svg width="100%" viewBox="0 0 660 522" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>--validate Internal Pipeline: Calcite Parsing &amp; DDL/DML Dispatch</title>
  <desc>Shows per-SQL parse details in validate mode — Calcite syntax parsing and semantic reference resolution, with the DDL immediate execution and DML buffering decision logic</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Entry -->
  <rect x="230" y="44" width="200" height="30" rx="6" fill="#26215C" stroke="none"/>
  <text x="330" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">executor.validate(script)</text>

  <line x1="330" y1="74" x2="330" y2="98" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- Loop -->
  <rect x="40" y="100" width="580" height="222" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="60" y="124" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">while (iterator.hasNext()) — process each SQL</text>

  <!-- State machine reference -->
  <rect x="60" y="136" width="200" height="52" rx="5" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="160" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">1. State machine extracts next SQL</text>
  <text x="160" y="171" text-anchor="middle" font-size="9" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">See Part 1 for details</text>
  <text x="160" y="183" text-anchor="middle" font-size="9" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">Semicolons in quotes/comments not split</text>

  <line x1="260" y1="157" x2="280" y2="157" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- Parse body -->
  <rect x="280" y="132" width="320" height="178" rx="8" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="300" y="151" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">2. parse() → Calcite</text>

  <!-- Layer 1: Syntax -->
  <rect x="298" y="162" width="286" height="42" rx="5" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="314" y="181" font-size="11" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">① SqlParser → SqlNode AST</text>
  <text x="314" y="196" font-size="9" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">Syntax check: keywords, brackets, statement structure</text>

  <line x1="440" y1="204" x2="440" y2="218" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- Layer 2: Semantic -->
  <rect x="298" y="218" width="286" height="42" rx="5" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="314" y="237" font-size="11" font-weight="600" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">② SqlToOperationConverter → Operation</text>
  <text x="314" y="252" font-size="8" fill="#4A5E0B" font-family="-apple-system, PingFang SC, sans-serif">Semantic check: query Catalog → table exists? fields? types match?</text>

  <line x1="440" y1="260" x2="440" y2="274" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- Result -->
  <rect x="298" y="274" width="286" height="24" rx="5" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="440" y="290" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">Returns Operation (CreateTable / Modify / Set / ...)</text>

  <!-- Dispatch -->
  <line x1="330" y1="322" x2="330" y2="346" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrp)"/>

  <text x="330" y="362" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">3. Dispatch by Operation type</text>

  <!-- Branches -->
  <line x1="330" y1="368" x2="330" y2="382" stroke="#888780" stroke-width="0.8"/>
  <line x1="140" y1="382" x2="530" y2="382" stroke="#888780" stroke-width="0.8"/>
  <line x1="140" y1="382" x2="140" y2="398" stroke="#97C459" stroke-width="1" marker-end="url(#arrp)"/>
  <line x1="530" y1="382" x2="530" y2="398" stroke="#EF9F27" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- DDL immediate -->
  <rect x="60" y="400" width="160" height="52" rx="5" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="140" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">DDL / SET / CALL</text>
  <text x="140" y="432" text-anchor="middle" font-size="9" fill="#4A5E0B" font-family="-apple-system, PingFang SC, sans-serif">executeStatement()</text>
  <text x="140" y="446" text-anchor="middle" font-size="9" fill="#4A5E0B" font-family="-apple-system, PingFang SC, sans-serif">Immediately modify in-memory Catalog</text>

  <!-- DML buffer -->
  <rect x="440" y="400" width="180" height="60" rx="5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="530" y="417" text-anchor="middle" font-size="11" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">DML</text>
  <text x="530" y="431" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">INSERT / STATEMENT SET</text>
  <text x="530" y="444" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">Buffer ModifyOperation</text>
  <text x="530" y="456" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">No compilation, no submission</text>

  <!-- Key note -->
  <text x="60" y="488" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">💡 Why must DDL execute immediately? — Subsequent parse() depends on tables/views/functions registered by previous</text>
  <text x="60" y="502" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">DDL, otherwise Catalog is empty and parse reports Table not found</text>

</svg>
