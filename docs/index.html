<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flink SQL Bootstrap</title>
  <script>
    var lang = (navigator.language || 'en').toLowerCase();
    var base = window.location.pathname.replace(/(\/index\.html)?$/, '/');
    window.location.replace(base + (lang.startsWith('zh') ? 'zh/' : 'en/'));
  </script>
</head>
<body>
  <p>Redirecting to <a href="zh/">中文</a> or <a href="en/">English</a>...</p>
</body>
</html>
