<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flink 2.x SQL 脚本 Application Mode 执行链路</title>
  <desc>展示从用户 SQL 脚本到 SQL Gateway、SqlDriver、ScriptRunner 再到 ScriptExecutor 的完整链路</desc>
  <defs>
    <marker id="arr2x" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 外层容器：SQL Gateway 进程 -->
  <rect x="20" y="60" width="640" height="320" rx="14"
        fill="none" stroke="#9FE1CB" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="36" y="84" font-size="12" fill="#0f6e56" font-weight="600" font-family="-apple-system, PingFang SC, sans-serif">SQL Gateway 进程（必须启动）</text>

  <!-- 入口区：两个入口 -->
  <!-- sql-client.sh -f -->
  <rect x="60" y="24" width="170" height="44" rx="8"
        fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="145" y="43" text-anchor="middle" font-size="13" font-weight="600" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">sql-client.sh -f</text>
  <text x="145" y="59" text-anchor="middle" font-size="11" fill="#0f6e56" font-family="-apple-system, PingFang SC, sans-serif">命令行入口</text>

  <!-- REST API -->
  <rect x="450" y="24" width="170" height="44" rx="8"
        fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="535" y="43" text-anchor="middle" font-size="13" font-weight="600" fill="#085041" font-family="-apple-system, PingFang SC, sans-serif">SQL Gateway REST API</text>
  <text x="535" y="59" text-anchor="middle" font-size="11" fill="#0f6e56" font-family="-apple-system, PingFang SC, sans-serif">POST /sessions/{id}/scripts</text>

  <!-- 箭头：两个入口 → Gateway -->
  <line x1="145" y1="68" x2="220" y2="105" stroke="#5DCAA5" stroke-width="1.2" marker-end="url(#arr2x)"/>
  <line x1="535" y1="68" x2="460" y2="105" stroke="#5DCAA5" stroke-width="1.2" marker-end="url(#arr2x)"/>

  <!-- SqlDriver -->
  <rect x="200" y="105" width="280" height="52" rx="8"
        fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">SqlDriver</text>
  <text x="340" y="145" text-anchor="middle" font-size="11" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">Flink App 启动类 · flink-table-runtime</text>

  <!-- 箭头：SqlDriver → ScriptRunner -->
  <line x1="340" y1="157" x2="340" y2="190" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arr2x)"/>
  <text x="354" y="177" font-size="11" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">反射调用</text>

  <!-- ScriptRunner -->
  <rect x="200" y="190" width="280" height="52" rx="8"
        fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="211" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">ScriptRunner</text>
  <text x="340" y="230" text-anchor="middle" font-size="11" fill="#0C447C" font-family="-apple-system, PingFang SC, sans-serif">构建 SessionContext · flink-sql-gateway</text>

  <!-- 箭头：ScriptRunner → ScriptExecutor -->
  <line x1="340" y1="242" x2="340" y2="270" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arr2x)"/>
  <text x="354" y="260" font-size="11" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">委托执行</text>

  <!-- ScriptExecutor 外框 -->
  <rect x="90" y="270" width="500" height="90" rx="8"
        fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">ScriptExecutor</text>

  <!-- 内部三块 -->
  <rect x="110" y="300" width="140" height="46" rx="6"
        fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="180" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">ResultIterator</text>
  <text x="180" y="336" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">状态机切分 SQL</text>

  <rect x="270" y="300" width="140" height="46" rx="6"
        fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">OperationExecutor</text>
  <text x="340" y="336" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">parse → validate</text>

  <rect x="430" y="300" width="140" height="46" rx="6"
        fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="500" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">逐条执行</text>
  <text x="500" y="336" text-anchor="middle" font-size="11" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">DDL + DML 混合</text>

  <!-- 内部箭头 -->
  <line x1="250" y1="323" x2="268" y2="323" stroke="#BA7517" stroke-width="1" marker-end="url(#arr2x)"/>
  <line x1="410" y1="323" x2="428" y2="323" stroke="#BA7517" stroke-width="1" marker-end="url(#arr2x)"/>

  <!-- 底部问题标注 -->
  <text x="340" y="390" text-anchor="middle" font-size="12" fill="#A32D2D" font-weight="500" font-family="-apple-system, PingFang SC, sans-serif">⚠ 整条链路必须跑在 SQL Gateway 进程内，且仅存在于 Flink 2.x</text>
</svg>