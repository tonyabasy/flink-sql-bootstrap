<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flink SQL --validate → --compile → execute 全链路</title>
  <desc>展示 SQL 脚本从校验到编译到执行的三阶段完整链路，validate 是最轻量的入口</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 阶段标签 -->
  <text x="103" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">阶段一</text>
  <text x="340" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">阶段二</text>
  <text x="577" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">阶段三</text>

  <!-- ── 阶段一：validate ── -->
  <rect x="20" y="42" width="166" height="212" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">语法 + 语义校验</text>
  <text x="103" y="82" text-anchor="middle" font-size="11" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">--validate</text>

  <rect x="36" y="96" width="134" height="28" rx="5" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="114" text-anchor="middle" font-size="11" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">SQL 脚本文件</text>

  <line x1="103" y1="124" x2="103" y2="140" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="36" y="140" width="134" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="158" text-anchor="middle" font-size="11" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">Calcite parser.parse()</text>

  <line x1="103" y1="168" x2="103" y2="184" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="36" y="184" width="134" height="28" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="202" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">DDL → 立即执行</text>

  <rect x="36" y="216" width="134" height="24" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="232" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">DML → 暂存（不编译）</text>

  <!-- validate → compile 箭头 -->
  <line x1="186" y1="158" x2="214" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- ── 阶段二：compile ── -->
  <rect x="214" y="42" width="252" height="212" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">编译为执行计划</text>
  <text x="340" y="82" text-anchor="middle" font-size="11" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">--compile</text>

  <rect x="228" y="96" width="224" height="28" rx="5" fill="#C3DCFA" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="114" text-anchor="middle" font-size="11" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">DML ModifyOperation 列表</text>

  <line x1="340" y1="124" x2="340" y2="140" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="228" y="140" width="224" height="28" rx="5" fill="#ffffff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">planner.compilePlan()</text>

  <line x1="340" y1="168" x2="340" y2="184" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="228" y="184" width="224" height="56" rx="5" fill="#ffffff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">InternalPlan (JSON)</text>
  <text x="340" y="218" text-anchor="middle" font-size="10" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">Source → Calc → Join → Sink DAG</text>
  <text x="340" y="232" text-anchor="middle" font-size="10" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">含 FilterPushDown 等优化</text>

  <!-- compile → execute 箭头 -->
  <line x1="466" y1="158" x2="494" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- ── 阶段三：execute ── -->
  <rect x="494" y="42" width="166" height="212" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">提交执行</text>
  <text x="577" y="82" text-anchor="middle" font-size="11" fill="#993C1D" font-family="-apple-system, PingFang SC, sans-serif">默认模式</text>

  <rect x="510" y="96" width="134" height="24" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="112" text-anchor="middle" font-size="10" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">translatePlan()</text>

  <line x1="577" y1="120" x2="577" y2="136" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="510" y="136" width="134" height="24" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="152" text-anchor="middle" font-size="10" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">injectResourceSpec()</text>

  <line x1="577" y1="160" x2="577" y2="176" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="510" y="176" width="134" height="38" rx="5" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
  <text x="577" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">executeInternal()</text>
  <text x="577" y="207" text-anchor="middle" font-size="10" fill="#FAECE7" font-family="-apple-system, PingFang SC, sans-serif">→ Flink 集群</text>

  <!-- 底部标注 -->
  <text x="103" y="268" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">~2s · 不连集群</text>
  <text x="340" y="268" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">~5s · 本地编译</text>
  <text x="577" y="268" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">集群运行</text>

</svg>
