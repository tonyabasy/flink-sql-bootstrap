<svg width="100%" viewBox="0 0 660 522" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>--validate 内部链路：Calcite 解析与 DDL/DML 分派</title>
  <desc>展示 validate 模式下逐条 SQL 的 parse 细节——Calcite 语法解析和语义引用解析，以及 DDL 立即执行、DML 暂存的决策逻辑</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 入口 -->
  <rect x="230" y="44" width="200" height="30" rx="6" fill="#26215C" stroke="none"/>
  <text x="330" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">executor.validate(script)</text>

  <line x1="330" y1="74" x2="330" y2="98" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- 循环框 -->
  <rect x="40" y="100" width="580" height="222" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="60" y="124" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">while (iterator.hasNext()) — 逐条处理 SQL</text>

  <!-- 切分引用 -->
  <rect x="60" y="136" width="172" height="52" rx="5" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="146" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">1. 状态机切出下一条 SQL</text>
  <text x="146" y="171" text-anchor="middle" font-size="9" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">详见第一篇</text>
  <text x="146" y="183" text-anchor="middle" font-size="9" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">引号 / 注释内的分号不切</text>

  <line x1="232" y1="157" x2="260" y2="157" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- parse 主体 -->
  <rect x="260" y="132" width="340" height="178" rx="8" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="280" y="151" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">2. parse() → Calcite</text>

  <!-- Layer 1: 语法 -->
  <rect x="278" y="162" width="306" height="42" rx="5" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="294" y="181" font-size="11" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">① SqlParser → SqlNode AST</text>
  <text x="294" y="196" font-size="9" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">语法检查：关键字、括号、语句结构</text>

  <line x1="430" y1="204" x2="430" y2="218" stroke="#4085D6" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- Layer 2: 语义 -->
  <rect x="278" y="218" width="306" height="42" rx="5" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="294" y="237" font-size="11" font-weight="600" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">② SqlToOperationConverter → Operation</text>
  <text x="294" y="252" font-size="9" fill="#4A5E0B" font-family="-apple-system, PingFang SC, sans-serif">语义检查：查 Catalog → 表存在? 字段在? 类型对?</text>

  <line x1="430" y1="260" x2="430" y2="274" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- 结果 -->
  <rect x="278" y="274" width="306" height="24" rx="5" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="430" y="290" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">返回 Operation (CreateTable / Modify / Set / ...)</text>

  <!-- 分派区 -->
  <line x1="330" y1="322" x2="330" y2="346" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrp)"/>

  <text x="330" y="362" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">3. 按 Operation 类型分派</text>

  <!-- 分支 -->
  <line x1="330" y1="368" x2="330" y2="382" stroke="#888780" stroke-width="0.8"/>
  <line x1="140" y1="382" x2="530" y2="382" stroke="#888780" stroke-width="0.8"/>
  <line x1="140" y1="382" x2="140" y2="398" stroke="#97C459" stroke-width="1" marker-end="url(#arrp)"/>
  <line x1="530" y1="382" x2="530" y2="398" stroke="#EF9F27" stroke-width="1" marker-end="url(#arrp)"/>

  <!-- DDL 立即执行 -->
  <rect x="60" y="400" width="160" height="52" rx="5" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="140" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">DDL / SET / CALL</text>
  <text x="140" y="432" text-anchor="middle" font-size="9" fill="#4A5E0B" font-family="-apple-system, PingFang SC, sans-serif">executeStatement()</text>
  <text x="140" y="446" text-anchor="middle" font-size="9" fill="#4A5E0B" font-family="-apple-system, PingFang SC, sans-serif">立即修改内存 Catalog</text>

  <!-- DML 暂存 -->
  <rect x="440" y="400" width="180" height="60" rx="5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="530" y="417" text-anchor="middle" font-size="11" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">DML</text>
  <text x="530" y="431" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">INSERT / STATEMENT SET</text>
  <text x="530" y="444" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">暂存 ModifyOperation</text>
  <text x="530" y="456" text-anchor="middle" font-size="9" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">不编译、不提交</text>

  <!-- 关键注释 -->
  <text x="60" y="488" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">💡 为什么 DDL 必须立即执行？——后续语句的 parse() 依赖前面 DDL 注册的表/视图/函数，不执行则 Catalog 为空，parse</text>
  <text x="60" y="502" font-size="10" fill="#888780" font-family="-apple-system, PingFang SC, sans-serif">直接报 Table not found</text>

</svg>
