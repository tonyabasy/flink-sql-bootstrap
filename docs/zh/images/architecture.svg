<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 715 480" role="img">
  <title>flink-sql-bootstrap 架构图</title>
  <desc>外部输入通过 flink-sql-bootstrap 流向 Flink 集群</desc>

  <style>
    .t  { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 400; }
    .ts { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
    .arr { stroke-width: 1.5; fill: none; }

    .ext-box { fill: #F1EFE8; stroke: #CCC8BB; stroke-width: 0.5; }
    .ext-text { fill: #5F5E5A; }
    .sys-box { fill: #F1EFE8; stroke: #CCC8BB; stroke-width: 0.5; }
    .sys-text { fill: #444441; }

    .c-purple-bg { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .c-purple-inner { fill: #DCD9FA; stroke: #897FE0; stroke-width: 0.5; }
    .c-purple-title { fill: #3C3489; }
    .c-purple-sub { fill: #534AB7; }

    .c-teal-bg { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .c-teal-inner { fill: #C8EBDE; stroke: #168A63; stroke-width: 0.5; }
    .c-teal-title { fill: #085041; }
    .c-teal-sub { fill: #0F6E56; }

    .c-coral-bg { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .c-coral-text { fill: #712B13; }

    .ann-box { fill: #F1EFE8; stroke: #CCC8BB; stroke-width: 0.5; }
    .ann-text { fill: #5F5E5A; }

    @media (prefers-color-scheme: dark) {
      .ext-box { fill: #3D3D3B; stroke: #5F5E5A; }
      .ext-text { fill: #AAA69D; }
      .sys-box { fill: #3D3D3B; stroke: #5F5E5A; }
      .sys-text { fill: #CCC8BB; }
      .c-purple-bg { fill: #3C3489; stroke: #8B85D6; }
      .c-purple-inner { fill: #2B2566; stroke: #6B64C4; }
      .c-purple-title { fill: #C5C0F2; }
      .c-purple-sub { fill: #A49EE8; }
      .c-teal-bg { fill: #085041; stroke: #2E8B6E; }
      .c-teal-inner { fill: #063A2F; stroke: #207054; }
      .c-teal-title { fill: #A3DFCC; }
      .c-teal-sub { fill: #6AC9A8; }
      .c-coral-bg { fill: #712B13; stroke: #C45A3A; }
      .c-coral-text { fill: #F0B8A5; }
      .ann-box { fill: #3D3D3B; stroke: #5F5E5A; }
      .ann-text { fill: #AAA69D; }
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 外部输入 -->
  <rect x="38" y="95" width="132" height="50" rx="4" class="ext-box"/>
  <text class="th sys-text" x="104" y="115" text-anchor="middle">.sql Script</text>
  <text class="ts ext-text" x="104" y="133" text-anchor="middle">DDL + DML</text>

  <rect x="38" y="162" width="132" height="50" rx="4" class="ext-box"/>
  <text class="th sys-text" x="104" y="182" text-anchor="middle">Catalog JSON</text>
  <text class="ts ext-text" x="104" y="200" text-anchor="middle">Tables / Views / UDF</text>

  <rect x="38" y="229" width="132" height="50" rx="4" class="ext-box"/>
  <text class="th sys-text" x="104" y="249" text-anchor="middle">Resource JSON</text>
  <text class="ts ext-text" x="104" y="267" text-anchor="middle">Per-Op Tuning</text>

  <rect x="38" y="296" width="132" height="50" rx="4" class="ext-box"/>
  <text class="th sys-text" x="104" y="316" text-anchor="middle">UDF JAR</text>
  <text class="ts ext-text" x="104" y="334" text-anchor="middle">--dependency</text>

  <!-- 箭头 -->
  <line x1="170" y1="120" x2="216" y2="120" class="arr" stroke="#888780" marker-end="url(#arrow)"/>
  <line x1="170" y1="187" x2="216" y2="187" class="arr" stroke="#888780" marker-end="url(#arrow)"/>
  <line x1="170" y1="254" x2="216" y2="254" class="arr" stroke="#888780" marker-end="url(#arrow)"/>
  <line x1="170" y1="321" x2="216" y2="321" class="arr" stroke="#888780" marker-end="url(#arrow)"/>

  <!-- 主容器 -->
  <rect x="218" y="50" width="335" height="340" rx="20" class="sys-box"/>
  <text class="th sys-text" x="385" y="82" text-anchor="middle">flink-sql-bootstrap</text>

  <!-- 列 A：输入处理（紫色） -->
  <rect x="236" y="104" width="136" height="252" rx="10" class="c-purple-bg"/>
  <text class="th c-purple-title" x="304" y="128" text-anchor="middle">输入处理</text>
  <text class="ts c-purple-sub" x="304" y="146" text-anchor="middle">Input Processing</text>

  <rect x="246" y="170" width="116" height="48" rx="4" class="c-purple-inner"/>
  <text class="t c-purple-title" x="304" y="188" text-anchor="middle">CLI 解析</text>
  <text class="ts c-purple-sub" x="304" y="204" text-anchor="middle">-s / --validate</text>

  <rect x="246" y="228" width="116" height="48" rx="4" class="c-purple-inner"/>
  <text class="t c-purple-title" x="304" y="246" text-anchor="middle">文件读取</text>
  <text class="ts c-purple-sub" x="304" y="262" text-anchor="middle">多协议 URI</text>

  <rect x="246" y="286" width="116" height="48" rx="4" class="c-purple-inner"/>
  <text class="t c-purple-title" x="304" y="304" text-anchor="middle">依赖合并</text>
  <text class="ts c-purple-sub" x="304" y="320" text-anchor="middle">classpaths</text>

  <!-- 箭头 colA → colB -->
  <line x1="372" y1="230" x2="390" y2="230" class="arr" stroke="#888780" marker-end="url(#arrow)"/>

  <!-- 列 B：核心执行（青色） -->
  <rect x="392" y="104" width="136" height="252" rx="10" class="c-teal-bg"/>
  <text class="th c-teal-title" x="460" y="128" text-anchor="middle">核心执行</text>
  <text class="ts c-teal-sub" x="460" y="146" text-anchor="middle">Core Engine</text>

  <rect x="402" y="170" width="116" height="48" rx="4" class="c-teal-inner"/>
  <text class="t c-teal-title" x="460" y="188" text-anchor="middle">SQL 编排</text>
  <text class="ts c-teal-sub" x="460" y="204" text-anchor="middle">DDL 立即 / DML 延迟</text>

  <rect x="402" y="228" width="116" height="48" rx="4" class="c-teal-inner"/>
  <text class="t c-teal-title" x="460" y="246" text-anchor="middle">Catalog 恢复</text>
  <text class="ts c-teal-sub" x="460" y="262" text-anchor="middle">JSON → 内存 Catalog</text>

  <rect x="402" y="286" width="116" height="48" rx="4" class="c-teal-inner"/>
  <text class="t c-teal-title" x="460" y="304" text-anchor="middle">资源注入</text>
  <text class="ts c-teal-sub" x="460" y="320" text-anchor="middle">SlotSharingGroup</text>

  <!-- 箭头 system → output -->
  <line x1="528" y1="230" x2="575" y2="230" class="arr" stroke="#888780" marker-end="url(#arrow)"/>

  <!-- 外部输出（珊瑚色） -->
  <rect x="575" y="165" width="90" height="130" rx="6" class="c-coral-bg"/>
  <text class="th c-coral-text" x="620" y="200" text-anchor="middle">Flink</text>
  <text class="th c-coral-text" x="620" y="218" text-anchor="middle">Cluster</text>
  <text class="ts c-coral-text" x="620" y="244" text-anchor="middle">Local</text>
  <text class="ts c-coral-text" x="620" y="262" text-anchor="middle">YARN</text>
  <text class="ts c-coral-text" x="620" y="280" text-anchor="middle">Kubernetes</text>

  <!-- 底部注释 -->
  <rect x="40" y="412" width="630" height="32" rx="6" class="ann-box"/>
  <text class="ts ann-text" x="355" y="433" text-anchor="middle">
    不修改 Flink 引擎 · 兼容 1.20 ~ 2.x · --validate / --compile / --init-resource
  </text>
</svg>
