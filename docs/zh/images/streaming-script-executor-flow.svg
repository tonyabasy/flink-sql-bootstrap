<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>StreamingScriptExecutor 三阶段执行流程</title>
  <desc>展示 SQL 脚本经过智能切分、按类型分派、统一提交三个阶段的完整处理流程</desc>
  <defs>
    <marker id="arrp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 阶段标签行 -->
  <text x="103" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">阶段一</text>
  <text x="340" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">阶段二</text>
  <text x="577" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#5a5955" letter-spacing="0.04em" font-family="-apple-system, PingFang SC, sans-serif">阶段三</text>

  <!-- ── 阶段一：切分 ── -->
  <rect x="20" y="42" width="166" height="260" rx="10"
        fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">智能切分</text>
  <text x="103" y="82" text-anchor="middle" font-size="11" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">Tokenization</text>

  <!-- 切分示意 -->
  <rect x="36" y="96" width="134" height="28" rx="5" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="114" text-anchor="middle" font-size="11" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">SQL 脚本文件</text>

  <line x1="103" y1="124" x2="103" y2="140" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="36" y="140" width="134" height="24" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="156" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">CREATE TABLE …;</text>
  <rect x="36" y="169" width="134" height="24" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="185" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">SET 'key' = 'val';</text>
  <rect x="36" y="198" width="134" height="24" rx="5" fill="#ffffff" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="103" y="214" text-anchor="middle" font-size="10" fill="#3C3489" font-family="-apple-system, PingFang SC, sans-serif">INSERT INTO …;</text>

  <rect x="36" y="236" width="134" height="52" rx="5" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="103" y="253" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C" font-family="-apple-system, PingFang SC, sans-serif">状态机规则</text>
  <text x="103" y="268" text-anchor="middle" font-size="10" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">引号内分号 → 跳过</text>
  <text x="103" y="282" text-anchor="middle" font-size="10" fill="#534AB7" font-family="-apple-system, PingFang SC, sans-serif">注释内分号 → 跳过</text>

  <!-- 阶段一 → 阶段二 箭头 -->
  <line x1="186" y1="172" x2="214" y2="172" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- ── 阶段二：分派 ── -->
  <rect x="214" y="42" width="252" height="260" rx="10"
        fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53" font-family="-apple-system, PingFang SC, sans-serif">按类型分派</text>
  <text x="340" y="82" text-anchor="middle" font-size="11" fill="#185FA5" font-family="-apple-system, PingFang SC, sans-serif">Dispatch by Operation Type</text>

  <!-- 立即执行组 -->
  <rect x="228" y="96" width="224" height="120" rx="7"
        fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="244" y="115" font-size="11" font-weight="600" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">立即执行</text>

  <rect x="236" y="122" width="208" height="22" rx="4" fill="#C0DD97" stroke="none"/>
  <text x="340" y="137" text-anchor="middle" font-size="11" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">SET / RESET → 影响编译环境</text>
  <rect x="236" y="149" width="208" height="22" rx="4" fill="#C0DD97" stroke="none"/>
  <text x="340" y="164" text-anchor="middle" font-size="11" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">CREATE TABLE / VIEW / FUNCTION</text>
  <rect x="236" y="176" width="208" height="22" rx="4" fill="#C0DD97" stroke="none"/>
  <text x="340" y="191" text-anchor="middle" font-size="11" fill="#173404" font-family="-apple-system, PingFang SC, sans-serif">CALL → 存储过程副作用</text>

  <!-- 延迟执行组 -->
  <rect x="228" y="226" width="224" height="62" rx="7"
        fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="244" y="245" font-size="11" font-weight="600" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">延迟，统一编译</text>
  <rect x="236" y="251" width="208" height="28" rx="4" fill="#FAC775" stroke="none"/>
  <text x="340" y="261" text-anchor="middle" font-size="11" fill="#412402" font-family="-apple-system, PingFang SC, sans-serif">INSERT INTO / STATEMENT SET</text>
  <text x="340" y="275" text-anchor="middle" font-size="10" fill="#633806" font-family="-apple-system, PingFang SC, sans-serif">收集所有 DML，等待最终编译</text>

  <!-- 阶段二 → 阶段三 箭头 -->
  <line x1="466" y1="172" x2="494" y2="172" stroke="#888780" stroke-width="1.2" marker-end="url(#arrp)"/>

  <!-- ── 阶段三：编译提交 ── -->
  <rect x="494" y="42" width="166" height="260" rx="10"
        fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">统一提交</text>
  <text x="577" y="82" text-anchor="middle" font-size="11" fill="#993C1D" font-family="-apple-system, PingFang SC, sans-serif">Compile &amp; Submit</text>

  <rect x="510" y="96" width="134" height="30" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">compilePlan()</text>
  <line x1="577" y1="126" x2="577" y2="142" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="510" y="142" width="134" height="30" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="161" text-anchor="middle" font-size="11" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">translatePlan()</text>
  <line x1="577" y1="172" x2="577" y2="188" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="510" y="188" width="134" height="30" rx="5" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.5"/>
  <text x="577" y="203" text-anchor="middle" font-size="11" font-weight="600" fill="#4A1B0C" font-family="-apple-system, PingFang SC, sans-serif">injectResourceSpec()</text>
  <text x="577" y="216" text-anchor="middle" font-size="10" fill="#993C1D" font-family="-apple-system, PingFang SC, sans-serif">可选，算子级资源注入</text>
  <line x1="577" y1="222" x2="577" y2="238" stroke="#D85A30" stroke-width="1" marker-end="url(#arrp)"/>

  <rect x="510" y="238" width="134" height="42" rx="5" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
  <text x="577" y="257" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="-apple-system, PingFang SC, sans-serif">executeInternal()</text>
  <text x="577" y="272" text-anchor="middle" font-size="10" fill="#FAECE7" font-family="-apple-system, PingFang SC, sans-serif">提交到 Flink 集群</text>
</svg>