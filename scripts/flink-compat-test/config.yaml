# =============================================================================
# flink-compat-test 配置文件
# =============================================================================
# 路径默认为相对于项目根目录，以 ~/ 或 / 开头则为绝对路径

# ── 应用 ─────────────────────────────────────────────────────────────────────
# 应用 JAR 包路径
app_jar: "target/flink-sql-bootstrap-1.0.1.jar"

# 测试 SQL 脚本（classpath 路径）
test_script: "classpath:example-word-count-advanced.sql"

# ── 运行模式（可选） ─────────────────────────────────────────────────────────
# 留空 = 正常执行; 或 validate / compile / init-resource（三者互斥）
#   validate:      仅校验 SQL 语法，不编译不执行
#   compile:       校验 + 编译，输出优化计划 JSON
#   init-resource: 生成算子资源配置模板
run_mode: ""

# ── 可选应用参数 ─────────────────────────────────────────────────────────────
# 以下为 flink-sql-bootstrap 的额外参数，留空 = 不使用
resource_file: "classpath:example-resource.json"
catalog_file: "classpath:example-catalog.json"
dependencies:
  - "classpath:example-udf-reverse.jar"
  - "classpath:example-udf-substring.jar"

# ── 输出路径 ─────────────────────────────────────────────────────────────────
# 原始测试结果目录
results_dir: target/compat-test-results

# 生成的报告输出目录
report_dir: docs

# ── Flink 发行版 ─────────────────────────────────────────────────────────────
# 下载的 Flink 发行版缓存目录
flink_cache_dir: ~/.flink-dist

# ── 执行 ─────────────────────────────────────────────────────────────────────
# 等待打印输出的超时时间（秒），超时则判定失败
job_timeout: 180

# ── 测试模式 ─────────────────────────────────────────────────────────────────
# 每种模式：key（传递给 --target 参数）和显示标签
modes:
  - key: local
    label: Local
  - key: yarn-application
    label: YARN-App
  - key: yarn-session
    label: YARN-Session
  - key: kubernetes-session
    label: K8s-Session
  - key: kubernetes-application
    label: K8s-App
